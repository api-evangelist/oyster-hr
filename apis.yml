aid: oyster-hr
name: Oyster HR
description: >-
  Global employment platform with a REST API for hiring international employees,
  managing contracts, processing global payroll, and ensuring local compliance
  in 180+ countries. The API enables integration with HRIS and payroll systems,
  time-off management, expense management, invoicing, benefits, offboarding, and
  provides embeddable web components for partners and resellers.
